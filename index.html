<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOR Dashboard OS</title>
    <style>
        /* Базовые переменные для динамической смены контекстного цвета */
        :root {
            --accent-color: #4c6ef5;
            --accent-glow: rgba(76, 110, 245, 0.6);
            --accent-glow-muted: rgba(76, 110, 245, 0.25);
            --accent-border: rgba(76, 110, 245, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            user-select: none;
        }

        body {
            background-color: #0b0914;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #f1f3f5;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            position: relative;
            transition: background 0.3s ease;
        }

        /* Контейнер для динамического HTML-фона */
        #html-bg-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            z-index: -3;
            pointer-events: none;
            transition: filter 0.2s ease;
        }

        /* Класс активации кликов по фону */
        #html-bg-container.interactive-backend {
            pointer-events: auto !important;
            z-index: 1 !important;
        }

        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(11, 9, 20, 0.2) 0%, #0b0914 100%);
            z-index: -2;
            pointer-events: none;
        }

        /* Меню и виджеты всегда поверх интерактивного фона */
        .header, .main-content, .footer, .modal, #context-menu {
            position: relative;
            z-index: 10;
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            padding: 10px 20px;
        }

        .brand-zone {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--accent-color);
            text-shadow: 0 0 12px var(--accent-glow);
            transition: all 0.3s ease;
        }

        .settings-btn {
            background: transparent;
            border: none;
            color: #495057;
            font-size: 1.3rem;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
        }
        .settings-btn:hover { 
            color: var(--accent-color); 
            transform: rotate(45deg);
        }

        .clock-container { text-align: right; }
        #clock {
            font-size: 3rem;
            font-weight: 300;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            line-height: 1;
        }
        #date {
            font-size: 0.9rem;
            color: #868e96;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* Контент */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
        }

        /* Поиск */
        .search-box {
            width: 100%;
            max-width: 700px;
            background: rgba(20, 18, 36, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--accent-border);
            border-radius: 16px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            margin-bottom: 40px;
        }
        .search-box:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 20px var(--accent-glow-muted);
            transform: scale(1.01);
        }
        .search-icon { color: var(--accent-color); margin-right: 15px; font-size: 1.2rem; }
        .search-box input {
            width: 100%; background: transparent; border: none; outline: none; color: #ffffff; font-size: 1.2rem;
        }

        /* Сетка сайтов */
        .shortcuts-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            width: 100%;
        }

        .shortcut-card {
            background: rgba(20, 18, 36, 0.65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 20px 15px;
            text-align: center;
            text-decoration: none;
            color: #dee2e6;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            cursor: pointer;
            height: 110px;
        }
        .shortcut-card:hover {
            background: var(--accent-glow-muted);
            border-color: var(--accent-color);
            transform: translateY(-4px);
            color: #ffffff;
            box-shadow: 0 5px 15px var(--accent-glow-muted);
        }

        .shortcut-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            object-fit: contain;
        }

        .shortcut-letter-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--accent-color);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .shortcut-name {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .add-btn {
            border: 1px dashed var(--accent-color);
            color: var(--accent-color);
            font-size: 1.5rem;
        }
        .add-btn:hover {
            background: var(--accent-glow-muted);
            border-style: solid;
        }

        /* Контекстное меню */
        #context-menu {
            position: absolute;
            background: #141224;
            border: 1px solid var(--accent-border);
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            padding: 5px 0;
            width: 150px;
        }
        .menu-item {
            padding: 10px 15px;
            font-size: 0.9rem;
            color: #dee2e6;
            cursor: pointer;
            transition: background 0.2s;
        }
        .menu-item:hover {
            background: var(--accent-color);
            color: white;
        }

        /* Модалки */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 4, 10, 0.85);
            backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #131124;
            border: 1px solid var(--accent-border);
            border-radius: 20px;
            padding: 25px;
            width: 450px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7), 0 0 30px var(--accent-glow-muted);
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .modal-content::-webkit-scrollbar { width: 6px; }
        .modal-content::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 4px; }

        /* Элементы заголовков и разметки в красивых настройках */
        .modal-content h3 { 
            font-size: 1.1rem; 
            color: #ffffff; 
            margin-top: 10px; 
            border-left: 4px solid var(--accent-color); 
            padding-left: 10px;
            letter-spacing: 0.5px;
        }
        .modal-content h4 { font-size: 0.85rem; color: #868e96; margin-top: -5px; padding-left: 14px; }
        
        .modal-content input, .modal-content select {
            background: #0b0914; 
            border: 1px solid rgba(255,255,255,0.08);
            padding: 11px 14px; 
            border-radius: 10px; 
            color: white; 
            outline: none;
            font-size: 0.9rem; 
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .modal-content input:focus, .modal-content select:focus { 
            border-color: var(--accent-color); 
            box-shadow: 0 0 10px var(--accent-glow-muted);
        }
        
        /* Блоки-карточки секций внутри настроек */
        .settings-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            color: #dee2e6;
            font-size: 0.9rem;
        }
        .setting-group-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #dee2e6;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .setting-group-row input[type="checkbox"] {
            width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent-color);
        }
        .setting-group input[type="range"] {
            accent-color: var(--accent-color); cursor: pointer; width: 100%;
        }

        /* Выбор кастомного цвета (Контекстное оформление) */
        .color-picker-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 4px;
        }
        .color-preset {
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent; transition: transform 0.2s, border-color 0.2s;
        }
        .color-preset:hover { transform: scale(1.15); }
        .color-preset.active { border-color: #ffffff; transform: scale(1.1); }
        
        .custom-color-input {
            width: 45px !important; height: 32px; padding: 0 !important; 
            border: none; background: transparent; cursor: pointer; border-radius: 6px;
        }

        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
        .btn {
            padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;
            font-size: 0.9rem; transition: background 0.2s, transform 0.1s; text-align: center;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent-color); color: white; box-shadow: 0 4px 12px var(--accent-glow-muted); }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background: #2a273d; color: #dee2e6; border: 1px solid rgba(255,255,255,0.05); }
        .btn-secondary:hover { background: #34304a; }
        .btn-danger { background: #e63946; color: white; margin-top: 5px; }
        .btn-danger:hover { background: #c1121f; }

        /* Нижняя панель */
        .footer {
            width: 100%; height: 60px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            display: flex; align-items: center; overflow: hidden;
            pointer-events: none;
        }
        .running-fox {
            position: absolute; height: 50px; bottom: 5px; left: -150px;
            animation: runAcross 18s linear infinite;
        }

        @keyframes runAcross {
            0% { left: -150px; transform: scaleX(1); }
            48% { left: 100%; transform: scaleX(1); }
            50% { left: 100%; transform: scaleX(-1); }
            98% { left: -150px; transform: scaleX(-1); }
            100% { left: -150px; transform: scaleX(1); }
        }
    </style>
</head>
<body>

    <iframe id="html-bg-container"></iframe>
    <div class="grid-bg"></div>

    <div class="header">
        <div class="brand-zone">
            <div class="brand" id="os-brand-logo">GOR // OS</div>
            <button class="settings-btn" id="open-bg-settings" title="Настройки оформления">⚙</button>
            <input type="file" id="bg-input" accept="image/*, text/html" style="display: none;">
        </div>
        <div class="clock-container">
            <div id="clock">00:00:00</div>
            <div id="date">Загрузка...</div>
        </div>
    </div>

    <div class="main-content">
        <form id="search-form" action="https://www.google.com/search" method="get" class="search-box">
            <span class="search-icon" id="search-icon-label">🔍</span>
            <input type="text" id="search-input" placeholder="Поиск или URL..." autofocus autocomplete="off">
        </form>

        <div class="shortcuts-grid" id="shortcuts-container"></div>
    </div>

    <div class="footer">
        <img class="running-fox" src="GIF, MOV - Kit running loop - No background.gif" alt="Running Fox" onerror="this.style.display='none'">
    </div>

    <div id="context-menu">
        <div class="menu-item" id="ctx-edit">Редактировать</div>
        <div class="menu-item" id="ctx-delete" style="color: #ff6b6b;">Удалить</div>
    </div>

    <div class="modal" id="site-modal">
        <div class="modal-content">
            <h3 id="modal-title">Добавить ярлык</h3>
            <input type="text" id="site-name" placeholder="Название сайта (например: GitHub)">
            <input type="text" id="site-url" placeholder="URL-адрес (например: https://github.com)">
            <div class="modal-buttons">
                <button class="btn btn-secondary" id="modal-cancel">Отмена</button>
                <button class="btn btn-primary" id="modal-save">Сохранить</button>
            </div>
        </div>
    </div>

    <div class="modal" id="bg-modal">
        <div class="modal-content">
            
            <h3>Система и Брендинг</h3>
            <div class="settings-card">
                <div class="setting-group">
                    <label for="brand-text-input">Название системы:</label>
                    <input type="text" id="brand-text-input" placeholder="Введите название (например: GOR // OS)">
                </div>
            </div>

            <h3>Контекстный цвет системы</h3>
            <div class="settings-card">
                <div class="setting-group">
                    <label>Выберите акцентный цвет интерфейса:</label>
                    <div class="color-picker-wrapper">
                        <div class="color-preset active" data-color="#4c6ef5" style="background: #4c6ef5;"></div>
                        <div class="color-preset" data-color="#22c55e" style="background: #22c55e;"></div>
                        <div class="color-preset" data-color="#ec4899" style="background: #ec4899;"></div>
                        <div class="color-preset" data-color="#ef4444" style="background: #ef4444;"></div>
                        <div class="color-preset" data-color="#f59e0b" style="background: #f59e0b;"></div>
                        <span style="font-size: 0.8rem; color: #868e96; margin-left: 5px;">Свой:</span>
                        <input type="color" id="custom-color-picker" class="custom-color-input" value="#4c6ef5">
                    </div>
                </div>
            </div>

            <h3>Задний план и Эффекты</h3>
            <div class="settings-card">
                <button class="btn btn-primary" id="choose-file-btn">Загрузить картинку / GIF / HTML</button>

                <div class="setting-group" style="margin-top: 5px;">
                    <label for="blur-slider">Размытие заднего фона: <span id="blur-val">0px</span></label>
                    <input type="range" id="blur-slider" min="0" max="20" value="0">
                </div>

                <div class="setting-group-row" style="margin-top: 5px;">
                    <label for="interact-checkbox">Разрешить клики сквозь панель по фону</label>
                    <input type="checkbox" id="interact-checkbox">
                </div>
            </div>

            <h3>Поисковые системы</h3>
            <div class="settings-card">
                <div class="setting-group">
                    <label for="engine-select">Активная поисковая система:</label>
                    <select id="engine-select"></select>
                </div>

                <div class="engine-builder" style="margin-top: 5px;">
                    <span style="font-size: 0.85rem; font-weight: 600; color: #dee2e6;">Создать поисковик (Firefox-style)</span>
                    <input type="text" id="custom-engine-name" placeholder="Название (например: Bing)">
                    <input type="text" id="custom-engine-url" placeholder="Ссылка запроса (например: https://www.bing.com/search?q=)">
                    <button class="btn btn-primary" id="add-custom-engine-btn" style="padding: 8px; font-size: 0.85rem;">+ Добавить поисковик</button>
                </div>
            </div>

            <button class="btn btn-danger" id="reset-bg-btn">⚠️ Сбросить абсолютно ВСЁ</button>
            <div class="modal-buttons">
                <button class="btn btn-secondary" id="bg-modal-close">Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        const defaultSites = [
            { name: 'Tumo Portal', url: 'https://tumo.org' },
            { name: 'GitHub', url: 'https://github.com' },
            { name: 'YouTube', url: 'https://youtube.com' },
            { name: 'Gemini AI', url: 'https://gemini.google.com' }
        ];

        const defaultEngines = [
            { name: 'Google', url: 'https://www.google.com/search', param: 'q' },
            { name: 'DuckDuckGo', url: 'https://duckduckgo.com/', param: 'q' },
            { name: 'Yandex', url: 'https://yandex.ru/search/', param: 'text' }
        ];

        let shortcuts = JSON.parse(localStorage.getItem('gor_shortcuts')) || defaultSites;
        let engines = JSON.parse(localStorage.getItem('gor_custom_engines_list')) || defaultEngines;
        let currentEngineIndex = parseInt(localStorage.getItem('gor_search_engine_idx')) || 0;
        let currentTargetIndex = null;

        const container = document.getElementById('shortcuts-container');
        const ctxMenu = document.getElementById('context-menu');
        const siteModal = document.getElementById('site-modal');
        const bgModal = document.getElementById('bg-modal');
        const iframeBg = document.getElementById('html-bg-container');
        
        const blurSlider = document.getElementById('blur-slider');
        const blurVal = document.getElementById('blur-val');
        const interactCheckbox = document.getElementById('interact-checkbox');
        const brandTextInput = document.getElementById('brand-text-input');
        const osBrandLogo = document.getElementById('os-brand-logo');
        
        const engineSelect = document.getElementById('engine-select');
        const searchForm = document.getElementById('search-form');
        const searchInput = document.getElementById('search-input');
        const customColorPicker = document.getElementById('custom-color-picker');

        function getCleanDomain(url) {
            try {
                let cleanUrl = url.trim();
                if (!/^https?:\/\//i.test(cleanUrl)) cleanUrl = 'https://' + cleanUrl;
                return new URL(cleanUrl).hostname;
            } catch (e) { return ''; }
        }

        function renderShortcuts() {
            container.innerHTML = '';
            shortcuts.forEach((site, index) => {
                const card = document.createElement('a');
                card.className = 'shortcut-card';
                card.href = site.url;
                card.dataset.index = index;
                
                const domain = getCleanDomain(site.url);
                const firstLetter = site.name ? site.name.charAt(0) : '?';
                
                if (domain) {
                    const faviconUrl = `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;
                    card.innerHTML = `
                        <img class="shortcut-icon" src="${faviconUrl}" alt="" onerror="handleImgError(this, '${firstLetter}')">
                        <div class="shortcut-name">${site.name}</div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="shortcut-letter-icon">${firstLetter}</div>
                        <div class="shortcut-name">${site.name}</div>
                    `;
                }
                
                card.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    currentTargetIndex = index;
                    ctxMenu.style.top = `${e.pageY}px`;
                    ctxMenu.style.left = `${e.pageX}px`;
                    ctxMenu.style.display = 'flex';
                });

                container.appendChild(card);
            });

            const addCard = document.createElement('div');
            addCard.className = 'shortcut-card add-btn';
            addCard.innerHTML = '+';
            addCard.addEventListener('click', () => openSiteModal(null));
            container.appendChild(addCard);
        }

        function handleImgError(img, letter) {
            const parent = img.parentNode;
            const letterDiv = document.createElement('div');
            letterDiv.className = 'shortcut-letter-icon';
            letterDiv.textContent = letter;
            parent.replaceChild(letterDiv, img);
        }

        function saveShortcuts() {
            localStorage.setItem('gor_shortcuts', JSON.stringify(shortcuts));
            renderShortcuts();
        }

        function openSiteModal(index) {
            ctxMenu.style.display = 'none';
            if (index !== null) {
                document.getElementById('modal-title').textContent = 'Редактировать ярлык';
                document.getElementById('site-name').value = shortcuts[index].name;
                document.getElementById('site-url').value = shortcuts[index].url;
                currentTargetIndex = index;
            } else {
                document.getElementById('modal-title').textContent = 'Добавить ярлык';
                document.getElementById('site-name').value = '';
                document.getElementById('site-url').value = '';
                currentTargetIndex = null;
            }
            siteModal.style.display = 'flex';
        }

        document.getElementById('modal-save').addEventListener('click', () => {
            let name = document.getElementById('site-name').value.trim();
            let url = document.getElementById('site-url').value.trim();

            if (!name || !url) return alert('Заполните все поля!');
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

            if (currentTargetIndex !== null) {
                shortcuts[currentTargetIndex] = { name, url };
            } else {
                shortcuts.push({ name, url });
            }
            saveShortcuts();
            siteModal.style.display = 'none';
        });

        document.getElementById('modal-cancel').addEventListener('click', () => siteModal.style.display = 'none');
        document.getElementById('ctx-edit').addEventListener('click', () => openSiteModal(currentTargetIndex));
        document.getElementById('ctx-delete').addEventListener('click', () => {
            ctxMenu.style.display = 'none';
            if(confirm(`Удалить ${shortcuts[currentTargetIndex].name}?`)) {
                shortcuts.splice(currentTargetIndex, 1);
                saveShortcuts();
            }
        });

        document.addEventListener('click', () => ctxMenu.style.display = 'none');

        // --- Управление Контекстным Цветом (Темизация) ---
        function setSystemAccentColor(hexColor) {
            localStorage.setItem('gor_accent_color', hexColor);
            document.documentElement.style.setProperty('--accent-color', hexColor);
            
            // Превращаем HEX в RGBA для красивого мягкого свечения и прозрачных рамок
            const r = parseInt(hexColor.slice(1, 3), 16);
            const g = parseInt(hexColor.slice(3, 5), 16);
            const b = parseInt(hexColor.slice(5, 7), 16);
            
            document.documentElement.style.setProperty('--accent-glow', `rgba(${r}, ${g}, ${b}, 0.6)`);
            document.documentElement.style.setProperty('--accent-glow-muted', `rgba(${r}, ${g}, ${b}, 0.25)`);
            document.documentElement.style.setProperty('--accent-border', `rgba(${r}, ${g}, ${b}, 0.2)`);
            
            customColorPicker.value = hexColor;
            
            // Синхронизируем класс active на пресетах кружков
            document.querySelectorAll('.color-preset').forEach(p => {
                if(p.dataset.color.toLowerCase() === hexColor.toLowerCase()) {
                    p.classList.add('active');
                } else {
                    p.classList.remove('active');
                }
            });
        }

        // Клик по готовым кружкам-пресетам
        document.querySelectorAll('.color-preset').forEach(preset => {
            preset.addEventListener('click', (e) => {
                setSystemAccentColor(e.target.dataset.color);
            });
        });

        // Изменение цвета через ручную палитру input[type="color"]
        customColorPicker.addEventListener('input', (e) => {
            setSystemAccentColor(e.target.value);
        });

        function loadAccentColor() {
            const savedColor = localStorage.getItem('gor_accent_color') || '#4c6ef5';
            setSystemAccentColor(savedColor);
        }

        // --- Управление Поисковыми Системами ---
        function buildEngineSelect() {
            engineSelect.innerHTML = '';
            engines.forEach((eng, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = eng.name;
                if(idx === currentEngineIndex) opt.selected = true;
                engineSelect.appendChild(opt);
            });
        }

        function applySearchEngine() {
            if(currentEngineIndex >= engines.length) currentEngineIndex = 0;
            const currentEngine = engines[currentEngineIndex];
            searchForm.action = currentEngine.url;
            searchInput.name = currentEngine.param;
            searchInput.placeholder = `Поиск в ${currentEngine.name} или URL...`;
            localStorage.setItem('gor_search_engine_idx', currentEngineIndex);
        }

        engineSelect.addEventListener('change', (e) => {
            currentEngineIndex = parseInt(e.target.value);
            applySearchEngine();
        });

        document.getElementById('add-custom-engine-btn').addEventListener('click', () => {
            const nameInput = document.getElementById('custom-engine-name');
            const urlInput = document.getElementById('custom-engine-url');
            let name = nameInput.value.trim();
            let rawUrl = urlInput.value.trim();
            
            if(!name || !rawUrl) return alert('Заполните поля поисковой системы!');
            
            let finalUrl = rawUrl;
            let param = 'q';
            
            if(rawUrl.includes('?')) {
                try {
                    const splitParts = rawUrl.split('?');
                    finalUrl = splitParts[0] + '?';
                    const params = new URLSearchParams(splitParts[1]);
                    for (let key of params.keys()) {
                        param = key;
                        break;
                    }
                } catch(err) { param = 'q'; }
            } else {
                finalUrl = rawUrl + '?';
            }

            engines.push({ name: name, url: finalUrl, param: param });
            localStorage.setItem('gor_custom_engines_list', JSON.stringify(engines));
            currentEngineIndex = engines.length - 1;
            
            buildEngineSelect();
            applySearchEngine();
            nameInput.value = ''; urlInput.value = '';
        });

        searchForm.addEventListener('submit', (e) => {
            let value = searchInput.value.trim();
            if(!value) { e.preventDefault(); return; }
            const isUrl = /^(https?:\/\/)?([\w\d-]+\.)+\w{2,}(\/.*)?$/i.test(value);
            if (isUrl) {
                e.preventDefault();
                if (!/^https?:\/\//i.test(value)) value = 'https://' + value;
                window.location.href = value;
            }
        });

        // --- Изменение Текста Брендинга ---
        function applyBrandText() {
            const savedBrandText = localStorage.getItem('gor_brand_text') || 'GOR // OS';
            osBrandLogo.textContent = savedBrandText;
            brandTextInput.value = savedBrandText;
        }

        brandTextInput.addEventListener('input', (e) => {
            const txt = e.target.value.trim() || 'GOR // OS';
            osBrandLogo.textContent = txt;
            localStorage.setItem('gor_brand_text', txt);
        });

        // --- Управление фоном, Блуром и Кликабельностью ---
        const bgInput = document.getElementById('bg-input');
        document.getElementById('open-bg-settings').addEventListener('click', () => {
            buildEngineSelect();
            applyBrandText();
            loadAccentColor();
            bgModal.style.display = 'flex';
        });
        document.getElementById('bg-modal-close').addEventListener('click', () => bgModal.style.display = 'none');
        document.getElementById('choose-file-btn').addEventListener('click', () => bgInput.click());

        bgInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const rawData = event.target.result;
                    if (file.type === "text/html" || file.name.endsWith('.html')) {
                        localStorage.setItem('gor_custom_bg_type', 'html');
                    } else {
                        localStorage.setItem('gor_custom_bg_type', 'image');
                    }
                    localStorage.setItem('gor_custom_bg', rawData);
                    applyBackground(rawData, localStorage.getItem('gor_custom_bg_type'));
                };
                reader.readAsDataURL(file);
            }
            bgModal.style.display = 'none';
        });

        // ГЛОБАЛЬНЫЙ СБРОС ВСЕХ НАСТРОЕК ДО ЗАВОДСКИХ
        document.getElementById('reset-bg-btn').addEventListener('click', () => {
            if(confirm('Вы уверены, что хотите полностью сбросить ВСЕ настройки интерфейса, кастомные цвета, ярлыки и поисковики?')) {
                localStorage.clear();
                
                shortcuts = [...defaultSites];
                engines = [...defaultEngines];
                currentEngineIndex = 0;
                
                document.body.style.backgroundImage = 'none';
                iframeBg.style.display = 'none';
                iframeBg.src = '';
                
                blurSlider.value = 0;
                blurVal.textContent = '0px';
                interactCheckbox.checked = false;
                
                // Переинициализация
                setSystemAccentColor('#4c6ef5');
                applyBrandText();
                buildEngineSelect();
                applySearchEngine();
                renderShortcuts();
                updateBlurEffect();
                updateInteractivity();
                
                bgModal.style.display = 'none';
            }
        });

        blurSlider.addEventListener('input', (e) => {
            const val = e.target.value + 'px';
            blurVal.textContent = val;
            localStorage.setItem('gor_bg_blur', val);
            updateBlurEffect();
        });

        interactCheckbox.addEventListener('change', (e) => {
            localStorage.setItem('gor_bg_interactive', e.target.checked);
            updateInteractivity();
        });

        function updateBlurEffect() {
            const blurValue = localStorage.getItem('gor_bg_blur') || '0px';
            iframeBg.style.filter = `blur(${blurValue})`;
            if(localStorage.getItem('gor_custom_bg_type') !== 'html') {
                document.body.style.backdropFilter = `blur(${blurValue})`;
            } else {
                document.body.style.backdropFilter = 'none';
            }
        }

        function updateInteractivity() {
            const isInteractive = localStorage.getItem('gor_bg_interactive') === 'true';
            interactCheckbox.checked = isInteractive;
            if (isInteractive && localStorage.getItem('gor_custom_bg_type') === 'html') {
                iframeBg.classList.add('interactive-backend');
            } else {
                iframeBg.classList.remove('interactive-backend');
            }
        }

        function applyBackground(bgData, type) {
            if (!bgData) return;
            if (type === 'html') {
                document.body.style.backgroundImage = 'none';
                iframeBg.style.display = 'block';
                if(iframeBg.src !== bgData) iframeBg.src = bgData;
            } else {
                iframeBg.style.display = 'none';
                iframeBg.src = '';
                document.body.style.backgroundImage = `url('${bgData}')`;
            }
            updateBlurEffect();
            updateInteractivity();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toTimeString().split(' ')[0];
            const days = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
            const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
            document.getElementById('date').textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
        }

        // Запуск
        setInterval(updateClock, 1000);
        updateClock();
        renderShortcuts();
        buildEngineSelect();
        applySearchEngine();
        applyBrandText();
        loadAccentColor();

        const savedBlur = localStorage.getItem('gor_bg_blur') || '0px';
        blurSlider.value = parseInt(savedBlur);
        blurVal.textContent = savedBlur;

        applyBackground(localStorage.getItem('gor_custom_bg'), localStorage.getItem('gor_custom_bg_type'));
    </script>
</body>
</html>
